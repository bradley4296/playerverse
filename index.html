<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playerverse</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut
        } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc, 
            collection, 
            addDoc, 
            onSnapshot, 
            updateDoc, 
            arrayUnion, 
            arrayRemove, 
            query, 
            where, 
            increment, 
            deleteDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBKGF1QjEh-Y0LxAJzI640YdZ1ZDQ1OwJ8",
            authDomain: "the-play-a-verse.firebaseapp.com",
            projectId: "the-play-a-verse",
            storageBucket: "the-play-a-verse.firebasestorage.app",
            messagingSenderId: "497232239998",
            appId: "1:497232239998:web:73e86f8ae58a6386e2e72f"
        };

        const appPathId = "playerverse_v2_stable"; 
        
        // --- State Management ---
        let auth, db;
        let currentUser = null;
        let userData = null;
        let currentView = 'home';
        let games = [];
        let posts = [];
        let franchises = [];
        let notifications = [];
        let unsubs = [];
        let searchQuery = "";
        let isSignUpMode = false;
        let tempPostImg = null;
        let sidebarOpen = false;
        let tempGameAssets = { cover: null, code: null };
        let viewedProfileData = null; 

        const CATEGORIES = ["Action", "Adventure", "Puzzle", "RPG", "Arcade", "Horror", "Simulation", "Platformer", "Strategy", "Racing"];

        // --- Utility: Image Compression ---
        async function compressImage(base64Str, maxWidth = 800, maxHeight = 600, quality = 0.7) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        }

        // --- Initialization ---
        window.onload = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            onAuthStateChanged(auth, async (user) => {
                const loader = document.getElementById('loading-overlay');
                if (user) {
                    currentUser = user;
                    await syncProfile();
                    setupDataListeners();
                    showUI('app-container');
                } else {
                    currentUser = null;
                    userData = null;
                    cleanupListeners();
                    showUI('auth-container');
                }
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 600);
                }
            });
        };

        // --- Auth Logic ---
        window.handleAuth = async () => {
            const email = document.getElementById('auth-e').value.trim();
            const pass = document.getElementById('auth-p').value.trim();
            if(!email || !pass) return toast("Please enter your credentials.");
            try { 
                if(isSignUpMode) {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) { 
                const msg = err.code ? err.code.split('/')[1].replace(/-/g, ' ') : "Authentication failed.";
                toast(msg.charAt(0).toUpperCase() + msg.slice(1)); 
            }
        };

        window.toggleAuthMode = () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? 'Create Account' : 'Welcome Back';
            document.getElementById('auth-subtitle').innerText = isSignUpMode ? 'Join the community today.' : 'Sign in to continue your journey.';
            document.getElementById('auth-btn').innerText = isSignUpMode ? 'Register' : 'Sign In';
            document.getElementById('auth-toggle-text').innerText = isSignUpMode ? 'Already have an account? Log In' : 'Need an account? Sign Up';
        };

        window.signOutUser = () => signOut(auth);

        // --- Database & Sync Functions ---
        async function syncProfile() {
            if (!currentUser) return;
            const profileRef = doc(db, 'artifacts', appPathId, 'users', currentUser.uid, 'profile', 'user_data');
            unsubs = unsubs.filter(u => { 
                if (u.name === 'profile_listener') { u.fn(); return false; } 
                return true; 
            });
            return new Promise((resolve) => {
                const unsubFn = onSnapshot(profileRef, async (snapshot) => { 
                    if(snapshot.exists()) {
                        userData = snapshot.data(); 
                        updateNavbarDisplay();
                        if(currentView === 'profile' && (!viewedProfileData || viewedProfileData.userId === currentUser.uid)) renderView(); 
                        resolve();
                    } else {
                        const defaultProfile = {
                            username: currentUser.email ? currentUser.email.split('@')[0] : "Player_" + Math.floor(Math.random()*10000),
                            bio: "Welcome to my Playerverse profile!",
                            pfp: "https://res.cloudinary.com/dtuccytyv/image/upload/v1774967674/IMG_1431_my8t7p.pn",
                            banner: "https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=1000",
                            userId: currentUser.uid,
                            likedGames: [], 
                            likedPosts: [], 
                            following: [],
                            followersCount: 0,
                            joinDate: Date.now()
                        };
                        await setDoc(profileRef, defaultProfile);
                        resolve();
                    }
                }, (err) => {
                    console.error("Profile Sync Error:", err);
                    resolve();
                });
                unsubs.push({ name: 'profile_listener', fn: unsubFn });
            });
        }

        function setupDataListeners() {
            if (!currentUser) return;
            const collectionConfigs = [
                { key: 'games', path: 'games', sort: (a,b) => (b.timestamp?.toMillis?.() || b.timestamp || 0) - (a.timestamp?.toMillis?.() || a.timestamp || 0) }, 
                { key: 'posts', path: 'posts', sort: (a,b) => (b.timestamp?.toMillis?.() || b.timestamp || 0) - (a.timestamp?.toMillis?.() || a.timestamp || 0) }, 
                { key: 'franchises', path: 'franchises', sort: (a,b) => (a.name || "").localeCompare(b.name || "") }
            ];
            collectionConfigs.forEach(cfg => {
                const colRef = collection(db, 'artifacts', appPathId, 'public', 'data', cfg.path);
                const unsub = onSnapshot(colRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    if(cfg.key === 'games') games = data.sort(cfg.sort);
                    if(cfg.key === 'posts') posts = data.sort(cfg.sort);
                    if(cfg.key === 'franchises') franchises = data.sort(cfg.sort);
                    
                    // If modal is open for a game or post, refresh its data specifically
                    const openModalId = document.querySelector('[data-modal-id]')?.dataset.modalId;
                    if (openModalId) {
                        const updated = data.find(x => x.id === openModalId);
                        if (updated) {
                            if (cfg.key === 'games') updateGameDetailsUI(updated);
                            else if (cfg.key === 'posts') updatePostDetailsUI(updated);
                        }
                    }

                    if (currentView === 'home' && document.getElementById('game-discover-grid')) {
                         updateGameDiscovery();
                    } else if (currentView === 'profile' && viewedProfileData) {
                         const updatedViewed = data.find(u => u.userId === viewedProfileData.userId);
                         if (updatedViewed) viewedProfileData = updatedViewed;
                         renderView();
                    } else {
                         renderView();
                    }
                }, (err) => console.warn(`Listener error:`, err));
                unsubs.push({ name: cfg.key, fn: unsub });
            });

            const notifRef = collection(db, 'artifacts', appPathId, 'users', currentUser.uid, 'notifications');
            const unsubNotif = onSnapshot(notifRef, (snapshot) => {
                notifications = snapshot.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>(b.timestamp || 0) - (a.timestamp || 0));
                const badge = document.getElementById('notif-badge');
                if (badge) {
                    badge.classList.toggle('hidden', notifications.length === 0);
                    badge.innerText = notifications.length > 9 ? '9+' : notifications.length;
                }
            }, (err) => console.error("Notification error:", err));
            unsubs.push({ name: 'notifications', fn: unsubNotif });
        }

        function cleanupListeners() { 
            unsubs.forEach(u => u.fn()); 
            unsubs = []; 
        }

        function updateNavbarDisplay() {
            const navPfp = document.getElementById('user-pfp-nav');
            const navName = document.getElementById('user-name-nav');
            const mobilePfp = document.getElementById('user-pfp-mobile');
            if (navPfp && userData) navPfp.src = userData.pfp;
            if (mobilePfp && userData) mobilePfp.src = userData.pfp;
            if (navName && userData) navName.innerText = userData.username;
        }

        // --- UI & View Control ---
        function showUI(id) {
            document.getElementById('auth-container').classList.toggle('hidden', id !== 'auth-container');
            document.getElementById('app-container').classList.toggle('hidden', id !== 'app-container');
            if (id === 'app-container') renderView();
        }

        window.toggleSidebar = () => {
            sidebarOpen = !sidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        };

        window.setView = (view, profileId = null) => {
            currentView = view;
            searchQuery = ""; 
            if (view === 'profile') {
                if (profileId && profileId !== currentUser.uid) {
                    navigateToProfile(profileId);
                    return;
                } else {
                    viewedProfileData = userData;
                }
            } else {
                viewedProfileData = null;
            }
            renderView();
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            if (window.innerWidth < 1024 && sidebarOpen) toggleSidebar();
        };

        async function navigateToProfile(uid) {
            try {
                const profileRef = doc(db, 'artifacts', appPathId, 'users', uid, 'profile', 'user_data');
                const snap = await getDoc(profileRef);
                if (snap.exists()) {
                    viewedProfileData = snap.data();
                    renderView();
                    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
                    if (window.innerWidth < 1024 && sidebarOpen) toggleSidebar();
                } else {
                    toast("User profile not found.");
                }
            } catch (e) { toast("Error loading profile."); }
        }

        // --- Renderers ---
        window.renderView = () => {
            const main = document.getElementById('main-content');
            if (!userData || !main) return;
            main.innerHTML = "";
            switch(currentView) {
                case 'home': renderHomeView(main); break;
                case 'social': renderSocialView(main); break;
                case 'notifications': renderNotificationsView(main); break;
                case 'my-stuff': renderCreatorView(main); break;
                case 'profile': main.innerHTML = renderFullProfile(viewedProfileData || userData); break;
            }
        };

        function renderHomeView(container) {
            container.innerHTML = `
                <div class="mb-8">
                    <div class="relative max-w-2xl group">
                        <input type="text" id="main-search-input" class="search-input pl-14 pr-12" placeholder="          Find games or creators..." oninput="handleSearchInput(this.value)" value="${searchQuery}">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-lg transition-colors group-focus-within:text-blue-500">🔍</span>
                        <button id="search-clear-btn" onclick="clearSearch()" class="${searchQuery ? '' : 'hidden'} absolute right-4 top-1/2 -translate-y-1/2 w-7 h-7 bg-slate-200 hover:bg-slate-300 rounded-full flex items-center justify-center text-[10px] font-black transition-colors">✕</button>
                    </div>
                </div>
                <div id="series-section" class="mb-12 ${searchQuery ? 'hidden' : ''}">
                    <h2 class="section-label mb-4 px-1 text-slate-800">Active Series</h2>
                    <div class="flex gap-4 overflow-x-auto no-scrollbar pb-4 -mx-1 px-1">
                        ${franchises.map(s => `
                            <div class="series-card group" onclick="viewSeries('${s.id}')">
                                <div class="series-icon">${s.icon || '🎮'}</div>
                                <div class="font-bold text-xs truncate w-full text-center">${s.name}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div id="game-discovery-container">
                    <h2 class="section-label mb-6 text-slate-800">${searchQuery ? 'Search Results' : 'Discover New Worlds'}</h2>
                    <div class="game-grid" id="game-discover-grid"></div>
                </div>
            `;
            updateGameDiscovery();
        }

        window.handleSearchInput = (val) => { 
            searchQuery = val; 
            updateGameDiscovery();
        };

        window.clearSearch = () => {
            const input = document.getElementById('main-search-input');
            if (input) {
                input.value = "";
                searchQuery = "";
                updateGameDiscovery();
                input.focus();
            }
        };

        function updateGameDiscovery() {
            const grid = document.getElementById('game-discover-grid');
            const clearBtn = document.getElementById('search-clear-btn');
            const seriesSection = document.getElementById('series-section');
            const label = document.querySelector('#game-discovery-container .section-label');
            if (!grid) return;
            if (clearBtn) clearBtn.classList.toggle('hidden', searchQuery === "");
            if (seriesSection) seriesSection.classList.toggle('hidden', searchQuery !== "");
            if (label) label.innerText = searchQuery ? 'Search Results' : 'Discover New Worlds';
            const filtered = games.filter(g => 
                g.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                g.genre.toLowerCase().includes(searchQuery.toLowerCase()) || 
                g.authorName.toLowerCase().includes(searchQuery.toLowerCase())
            );
            grid.innerHTML = filtered.map(g => renderGameCard(g)).join('') || 
                '<div class="col-span-full py-20 text-center text-slate-400">No matches found for your search.</div>';
        }

        function renderSocialView(container) {
            container.innerHTML = `
                <div class="max-w-2xl mx-auto pb-24">
                    <div class="bg-white border-2 border-slate-100 rounded-[28px] p-6 mb-10 shadow-sm">
                        <div class="flex gap-4">
                            <img src="${userData.pfp}" class="w-12 h-12 rounded-2xl object-cover border cursor-pointer" onclick="setView('profile')">
                            <div class="flex-1">
                                <textarea id="post-input" class="post-textarea" placeholder="What's happening?"></textarea>
                                <div id="post-img-preview" class="mt-4"></div>
                                <div class="flex justify-between items-center mt-6 pt-6 border-t border-slate-50">
                                    <label class="btn-icon cursor-pointer">
                                        <input type="file" id="post-file-input" hidden accept="image/*" onchange="handlePostImg(this)">
                                        <span>🖼️</span>
                                    </label>
                                    <button id="post-submit-btn" onclick="submitPost()" class="btn-solid !h-11 !px-10">Share</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${posts.map(p => renderPost(p)).join('')}
                    </div>
                </div>
            `;
        }

        function renderNotificationsView(container) {
            container.innerHTML = `
                <div class="max-w-xl mx-auto">
                    <h2 class="section-label mb-8">Activity Feed</h2>
                    <div class="space-y-3">
                        ${notifications.map(n => `
                            <div class="bg-white border rounded-3xl p-5 flex items-center gap-5 cursor-pointer" onclick="setView('profile', '${n.fromId}')">
                                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-xl">
                                    ${n.type === 'like' ? '❤️' : n.type === 'follow' ? '✨' : '💬'}
                                </div>
                                <div class="flex-1">
                                    <p class="text-sm"><strong>${n.fromName}</strong> ${n.message || 'interacted with you.'}</p>
                                    <span class="text-[10px] font-bold text-slate-300 uppercase">${formatTime(n.timestamp)}</span>
                                </div>
                            </div>
                        `).join('') || `<p class="py-20 text-center text-slate-400">No recent activity.</p>`}
                    </div>
                </div>
            `;
        }

        function renderCreatorView(container) {
            container.innerHTML = `
                <div class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <h1 class="text-3xl font-black">Creator Studio</h1>
                    <div class="flex gap-2">
                        <button class="btn-outline !h-12 !px-6" onclick="openCreateFranchise()">New Franchise</button>
                        <button class="btn-solid !h-12 !px-6" onclick="openPublish()">Publish Game</button>
                    </div>
                </div>
                <div class="mb-12">
                    <h2 class="section-label mb-6">Your Franchises</h2>
                    <div class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                        ${franchises.filter(f => f.authorId === currentUser.uid).map(f => `
                            <div class="series-card group relative">
                                <div class="series-icon" onclick="viewSeries('${f.id}')">${f.icon || '🎮'}</div>
                                <div class="font-bold text-xs truncate w-full text-center">${f.name}</div>
                                <button class="absolute -top-1 -right-1 bg-white border rounded-full w-6 h-6 text-[10px] shadow-sm hover:bg-red-50" onclick="deleteFranchise('${f.id}')">✕</button>
                            </div>
                        `).join('') || `<p class="text-slate-300 italic text-sm">No franchises created.</p>`}
                    </div>
                </div>
                <h2 class="section-label mb-6">Individual Games</h2>
                <div class="game-grid">
                    ${games.filter(g => g.authorId === currentUser.uid).map(g => renderGameCard(g, true)).join('') || `
                        <div class="col-span-full py-16 border-2 border-dashed border-slate-100 rounded-[32px] text-center">
                            <p class="text-slate-300">You haven't shared any games yet.</p>
                        </div>
                    `}
                </div>
            `;
        }

        function renderGameCard(g, isMyStuff = false) {
            const isLiked = userData?.likedGames?.includes(g.id);
            return `
                <div class="game-card group" onclick="viewGameDetails('${g.id}')">
                    <div class="aspect-[16/10] bg-cover bg-center relative transition-transform duration-500 group-hover:scale-105" style="background-image:url(${g.cover})">
                        <div class="absolute top-3 left-3 bg-white/95 px-2 py-1 rounded-lg text-[9px] font-black text-blue-600 uppercase">
                            ${g.genre}
                        </div>
                    </div>
                    <div class="p-4 bg-white">
                        <h3 class="font-bold text-sm truncate mb-1">${g.title}</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest cursor-pointer hover:text-blue-500" onclick="event.stopPropagation(); setView('profile', '${g.authorId}')">BY ${g.authorName}</p>
                        <div class="flex items-center justify-between mt-5 pt-3 border-t border-slate-50">
                            <div class="flex gap-3">
                                <button onclick="event.stopPropagation(); toggleLike('games', '${g.id}')" class="text-[11px] font-black transition-colors ${isLiked ? 'text-rose-500' : 'text-slate-300 hover:text-rose-400'}">
                                    ${isLiked ? '❤️' : '🤍'} ${g.likes?.length || 0}
                                </button>
                                <span class="text-[11px] font-black text-slate-300">🎮 ${g.plays || 0}</span>
                                <span class="text-[11px] font-black text-slate-300">💬 ${g.comments?.length || 0}</span>
                            </div>
                            ${isMyStuff ? `
                                <div class="flex gap-2">
                                    <button class="text-[10px] font-black text-blue-500 uppercase px-1" onclick="event.stopPropagation(); openEditGame('${g.id}')">Update</button>
                                    <button class="text-[10px] font-black text-red-500 uppercase px-1" onclick="event.stopPropagation(); deleteGame('${g.id}')">Delete</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPost(p) {
            const isLiked = userData?.likedPosts?.includes(p.id);
            const ts = p.timestamp?.toMillis?.() || p.timestamp || Date.now();
            return `
                <div class="post-card" onclick="viewPostDetails('${p.id}')">
                    <div class="flex items-center gap-4 mb-5">
                        <img src="${p.authorPfp}" class="w-11 h-11 rounded-2xl object-cover border cursor-pointer" onclick="event.stopPropagation(); setView('profile', '${p.authorId}')">
                        <div>
                            <strong class="text-[15px] font-bold block cursor-pointer hover:text-blue-500" onclick="event.stopPropagation(); setView('profile', '${p.authorId}')">${p.authorName}</strong>
                            <span class="text-[10px] text-slate-300 font-black uppercase">${formatTime(ts)}</span>
                        </div>
                    </div>
                    <div class="text-[15px] leading-relaxed mb-5">${p.content}</div>
                    ${p.image ? `<img src="${p.image}" class="w-full rounded-[24px] mb-5 border border-slate-50">` : ''}
                    <div class="flex gap-6 pt-5 border-t border-slate-50">
                        <button onclick="event.stopPropagation(); toggleLike('posts', '${p.id}')" class="text-[13px] font-black transition-colors ${isLiked ? 'text-rose-500' : 'text-slate-400 hover:text-rose-400'}">
                            ${isLiked ? '❤️' : '🤍'} ${p.likes?.length || 0}
                        </button>
                        <button class="text-[13px] font-black text-slate-400">
                            💬 ${p.comments?.length || 0}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderFullProfile(data) {
            const isMe = data.userId === currentUser.uid;
            const isFollowing = userData?.following?.includes(data.userId);
            const userGames = games.filter(g => g.authorId === data.userId);
            return `
                <div class="max-w-4xl mx-auto pb-20">
                    <div class="h-48 md:h-64 bg-slate-100 rounded-[40px] mb-8 shadow-inner overflow-hidden relative" style="background-image:url(${data.banner}); background-size:cover; background-position:center"></div>
                    <div class="px-8 flex flex-col md:flex-row justify-between items-start md:items-end -mt-24 md:-mt-28 mb-12 gap-6 relative z-10">
                        <img src="${data.pfp}" class="w-32 h-32 md:w-44 md:h-44 rounded-[48px] ring-[10px] ring-white shadow-xl bg-white object-cover border">
                        <div class="flex-1 pb-4">
                            <h1 class="text-4xl font-black text-slate-900 mb-1">${data.username}</h1>
                            <div class="flex gap-4 text-xs font-bold text-slate-400 uppercase tracking-widest">
                                <span><strong>${data.followersCount || 0}</strong> Followers</span>
                                <span><strong>${data.following?.length || 0}</strong> Following</span>
                            </div>
                        </div>
                        <div class="flex gap-2 pb-4">
                            ${isMe ? `
                                <button class="btn-outline !h-12 !px-6" onclick="openEditProfile()">Settings</button>
                                <button class="btn-danger !h-12 !px-6" onclick="signOutUser()">Log Out</button>
                            ` : `
                                <button class="btn-solid !h-12 !px-10 ${isFollowing ? '!bg-slate-100 !text-slate-900' : ''}" onclick="toggleFollow('${data.userId}')">
                                    ${isFollowing ? 'Unsubscribe' : 'Subscribe'}

            try { await deleteDoc(doc(db, 'artifacts', appPathId, 'public', 'data', 'games', id)); toast("Deleted."); } catch(e) { toast("Failed."); }
        };
    </script>
